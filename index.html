<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Inventaris Aset IT</title>

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">

    <meta name="theme-color" content="#005BAC">

    <meta name="mobile-web-app-capable" content="yes">

    <meta name="apple-mobile-web-app-capable" content="yes">

    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <meta name="apple-mobile-web-app-title" content="Inventaris">

    <link rel="apple-touch-icon" href="assets/icon-192.png">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- FONT -->
    <link rel="preconnect"
        href="https://fonts.googleapis.com">

    <link rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- ICON -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- QR Scanner -->
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

</head>

<body>

<div class="app">

    <!-- HEADER -->

    <header class="hero">

        <div class="overlay"></div>

        <img src="assets/logo-kai.png" class="logo">

        <h1>INVENTARIS ASET IT</h1>

        <p>PT Kereta Api Indonesia (Persero)</p>

        <span>DIVRE II SUMATERA BARAT</span>

    </header>

    <!-- SCANNER -->

    <section class="card">

        <div class="card-title">

            <i class="fa-solid fa-qrcode"></i>

            Scan QR Code

        </div>

        <div id="reader"></div>

    </section>

    <!-- FORM -->

    <section class="card">

        <div class="form-group">

            <label>Barcode</label>

            <input
                type="text"
                id="barcode"
                readonly>

        </div>

        <div class="form-group">

            <label>Nama Barang</label>

            <input
                type="text"
                id="namaBarang"
                placeholder="Masukkan nama barang">

        </div>

        <div class="form-group">

            <label>Petugas</label>

            <input
                type="text"
                id="petugas"
                placeholder="Masukkan nama petugas">

        </div>

        <button id="btnSimpan"
            onclick="simpanData()">

            <i class="fa-solid fa-floppy-disk"></i>

            SIMPAN DATA

        </button>

        <div id="status"></div>

    </section>

    <!-- HISTORY -->

    <section class="card">

        <div class="card-title">

            <i class="fa-solid fa-clock-rotate-left"></i>

            Riwayat Scan Hari Ini

        </div>

        <div id="historyList">

            Belum ada scan hari ini

        </div>

    </section>

</div>

<!-- Javascript -->
<script src="app.js"></script>
<script src="api.js"></script>

<!-- Register Service Worker -->
<script>

if ('serviceWorker' in navigator) {

    window.addEventListener('load', () => {

        navigator.serviceWorker.register('./service-worker.js')
        .then(reg => {

            console.log("Service Worker berhasil:", reg.scope);

        })
        .catch(err => {

            console.log("Service Worker gagal:", err);

        });

    });

}

</script>

</body>

</html>

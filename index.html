<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Inventaris Aset IT - PT KAI</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://unpkg.com/html5-qrcode"></script>

</head>

<body>

    <div class="container">

        <!-- HEADER -->
        <header class="header">

            <img src="assets/logo-kai.png" class="logo">

            <h1>INVENTARIS ASET IT</h1>

            <p>PT Kereta Api Indonesia (Persero)</p>

            <small>DIVRE II SUMATERA BARAT</small>

        </header>

        <!-- CONTENT -->

        <main class="content">

            <h2>📷 Scanner Barcode</h2>

           <div id="reader"></div>

            <div class="form-group">

                <label>Barcode</label>

                <input
                    type="text"
                    id="barcode"
                    readonly>

            </div>

            <div class="form-group">

                <label>Nama Barang</label>

                <input
                    type="text"
                    id="namaBarang"
                    placeholder="Masukkan nama barang">

            </div>

            <div class="form-group">

                <label>Petugas</label>

                <input
                    type="text"
                    id="petugas"
                    placeholder="Masukkan nama petugas">

            </div>

            <button id="btnSimpan" onclick="simpanData()">
                💾 SIMPAN DATA
             </button>

             <div id="status"></div>

        </main>

        <section class="history">

            <h2>📋 Riwayat Scan Hari Ini</h2>

            <div id="historyList">

                Belum ada scan hari ini

            </div>

        </section>

    </div>

    <script src="app.js"></script>
    <script src="api.js"></script>

</body>

</html>

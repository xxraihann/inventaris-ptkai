<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Inventaris Aset IT - PT KAI</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

</head>

<body>

    <div class="container">

        <!-- HEADER -->
        <header class="header">

            <img src="assets/logo-kai.png" class="logo">

            <h1>INVENTARIS ASET IT</h1>

            <p>PT Kereta Api Indonesia (Persero)</p>

            <small>DIVRE II SUMATERA BARAT</small>

        </header>

        <!-- CONTENT -->

        <main class="content">

            <div class="scanner-card">

    <h2>
    <i class="fa-solid fa-qrcode"></i>
    Scan QR Code
    </h2>

    <div id="reader"></div>

    </div>

            <div class="form-group">

                <label>Barcode</label>

                <input
                    type="text"
                    id="barcode"
                    readonly>

            </div>

            <div class="form-group">

                <label>Nama Barang</label>

                <input
                    type="text"
                    id="namaBarang"
                    placeholder="Masukkan nama barang">

            </div>

            <div class="form-group">

                <label>Petugas</label>

                <input
                    type="text"
                    id="petugas"
                    placeholder="Masukkan nama petugas">

            </div>

            <button id="btnSimpan" onclick="simpanData()">
                <i class="fa-solid fa-floppy-disk"></i>

                SIMPAN DATA
             </button>

             <div id="status"></div>

        </main>

        <section class="history">

            <h2>

            <i class="fa-solid fa-clock-rotate-left"></i>

            Riwayat Scan Hari Ini

            </h2>

            <div id="historyList">

                Belum ada scan hari ini

            </div>

        </section>

    </div>

    <script src="app.js"></script>
    <script src="api.js"></script>

</body>

</html>
